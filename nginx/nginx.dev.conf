server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=30s;

    # Frontend runs on host machine in development mode.
    set $frontend "http://host.docker.internal:3000";
    # Backend runs on host machine in development mode.
    set $backend "http://host.docker.internal:8080";
    set $nacos "http://nacos:8848";
    set $minio "http://minio:9001";
    set $cloudbeaver "http://cloudbeaver:8978";

    location / {
        proxy_pass $frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /images/ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /nacos {
        return 301 /nacos/;
    }

    location = /nacos/api {
        return 301 /nacos/api/;
    }

    location /nacos/api/ {
        rewrite ^/nacos/api/(.*)$ /nacos/v1/$1 break;
        proxy_pass $nacos;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /nacos/ {
        rewrite ^/nacos/(.*)$ /$1 break;
        proxy_pass $nacos;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /minio/ {
        rewrite ^/minio/(.*)$ /$1 break;
        proxy_pass $minio;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /db {
        return 301 /db/;
    }

    location /db/ {
        rewrite ^/db/(.*)$ /$1 break;
        proxy_pass $cloudbeaver;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
