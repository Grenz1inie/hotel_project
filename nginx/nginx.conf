server {
    listen 80;
    server_name _;

    # ==========================================
    # 全局配置
    # ==========================================
    # 使用 Docker 内部 DNS 解析器，避免在上游容器未启动时
    # Nginx 因主机名解析失败而启动异常。
    resolver 127.0.0.11 valid=30s;

    # 统一初始化上游变量，避免在 location 内出现未定义问题
    set $frontend "http://frontend:3000";
    set $backend "http://backend:8080";
    set $nacos_api "http://nacos:8848";
    set $nacos_console "http://nacos:8080";
    set $minio "http://minio:9001";
    set $adminer "http://adminer:8080";

    # ==========================================
    # 前端页面入口
    # ==========================================
    location / {
        proxy_pass $frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================
    # 核心后端服务
    # ==========================================
    # 后端 REST API 路由
    location /api/ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 后端图片资源路由
    location /images/ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================
    # Nacos 服务发现与配置中心
    # ==========================================
    location = /nacos {
        return 301 /nacos/;
    }

    location = /nacos/api {
        return 301 /nacos/api/;
    }

    # Nacos API 访问入口
    location /nacos/api/ {
        rewrite ^/nacos/api/(.*)$ /nacos/v1/$1 break; # 修正为标准的 Nacos v1 API 路径
        proxy_pass $nacos_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Nacos 控制台入口
    location /nacos/ {
        # 将外部前缀 /nacos/ 映射为上游根路径 /，避免静态资源路径解析异常
        rewrite ^/nacos/(.*)$ /$1 break;
        proxy_pass $nacos_console;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================
    # MinIO 对象存储
    # ==========================================
    # MinIO 控制台与相关接口入口
    location /minio/ {
        rewrite ^/minio/(.*)$ /$1 break;
        proxy_pass $minio;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================
    # Adminer 数据库管理
    # ==========================================
    location = /db {
        return 301 /db/;
    }

    # Adminer 页面入口
    location /db/ {
        rewrite ^/db/(.*)$ /$1 break;
        proxy_pass $adminer;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}