server:
  port: 8080
  tomcat:
    threads:
      max: 2000        # 再拉高一点
      min-spare: 200   # 保持更多核心线程不回收
    max-connections: 12000
    accept-count: 1000
    connection-timeout: 3000
    keep-alive-timeout: 60

spring:
  profiles:
    active: dev
  application:
    name: hotel-backend

  cloud:
    sentinel:
      transport:
        dashboard: hotel-sentinel-dashboard:8858
        port: 8719
      eager: true
      datasource:
        flow:
          file:
            file: /opt/config/sentinel-flow-rules.json
            rule-type: flow
            data-type: json

  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    # 现在具体配置已移至 application-dev.yml 和 application-prod.yml
    username: hotel_user
    password: 123456

  data:
    redis:
      timeout: 2000ms   # 避免长时间卡死
      lettuce:
        # 开启读写分离：优先读取从节点 (REPLICA_PREFERRED)
        # 注意：部分 Spring Boot 版本可能需要通过代码配置类显式指定 ReadFrom
        pool:
          max-active: 800      # 👈 提高
          max-idle: 300
          min-idle: 100
          max-wait: 1000ms     # 👈 降低等待时间
        cluster:
          refresh:
            adaptive: true      # 开启自适应刷新
            period: 60s         # 刷新周期

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

jetcache:
  statIntervalMinutes: 15
  areaInCacheName: false
  local:
    default:
      type: caffeine
      keyConvertor: fastjson
      expireAfterWriteInMillis: 300000 # 5分钟
  remote:
    default:
      type: redis.lettuce
      keyConvertor: fastjson
      valueEncoder: kryo
      valueDecoder: kryo
      poolConfig:
        minIdle: 10
        maxIdle: 50
        maxTotal: 200
      # Redis URI 将根据环境在 dev/prod 中配置

# minio:
aliyun:
  oss:
    endpoint: oss-cn-beijing.aliyuncs.com
    access-key-id:
    access-key-secret:
    bucket-name: hotelhotel

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

jwt:
  secret: "change-this-secret-to-a-very-long-random-string"
  expires-hours: 12

deepseek:
  api:
    url: https://api.deepseek.com/v1/chat/completions
    key: ${DEEPSEEK_API_KEY}
  model: deepseek-chat
