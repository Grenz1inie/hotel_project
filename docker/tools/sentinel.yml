services:
  # Sentinel Dashboard：流量控制与熔断降级管理控制台
  sentinel-dashboard:
    image: bladex/sentinel-dashboard:latest
    container_name: hotel-sentinel-dashboard
    ports:
      - "8858:8080"
    environment:
      # 当前使用 Dashboard 内存规则模式：控制台配置直接推送到后端客户端，重启后规则可能丢失。
      - JAVA_OPTS=-Dproject.name=sentinel-dashboard
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8858"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
