services:
  # Nginx：统一入口网关
  nginx:
    image: nginx:1.27-alpine
    container_name: hotel-nginx
    volumes:
      - ./nginx-conf/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    restart: unless-stopped

