name: hotel_project

# ------------------------------------------------------------
# 酒店项目本地开发编排
# 结构说明：
# 1) 基础中间件层：数据库、缓存、对象存储、配置中心
# 2) 应用服务层：后端应用、前端构建服务、统一网关
# 3) 运维工具层：数据库可视化管理组件
# ------------------------------------------------------------
services:
  # ============================================================
  # 一、基础中间件层
  # 说明：承载核心数据、缓存、对象存储与服务配置能力。
  # ============================================================

  # Oracle：核心业务数据库服务
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: hotel-oracle
    restart: always
    ports:
      - "1522:1521"
    environment:
      # 身份与认证参数。
      # - ORACLE_PDB=hotelpdb
      - ORACLE_PASSWORD=Hotel_PWD

      # 字符集与时区参数。
      - ORACLE_CHARACTERSET=AL32UTF8
      - TZ=Asia/Shanghai

      # 用户初始化通常通过挂载 SQL 脚本实现。
    volumes:
      # 数据卷：持久化数据库文件与初始化脚本。
      - ./oracle/oradata:/opt/oracle/oradata
      # - ./oracle/init.sql:/opt/oracle/scripts/setup/init.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # Redis：缓存与会话存储服务
  redis:
    image: redis:latest
    container_name: hotel-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data

  # MinIO：对象存储服务
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: hotel-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio/data:/data

  # Nacos：服务注册与配置中心
  nacos:
    image: nacos/nacos-server:v3.0.3
    container_name: hotel-nacos
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "false"
      NACOS_AUTH_TOKEN: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
      NACOS_AUTH_IDENTITY_KEY: "serverIdentity"
      NACOS_AUTH_IDENTITY_VALUE: "security"
    ports:
      # 端口策略：默认仅暴露 gRPC 通信端口。
      # 如需访问控制台或 HTTP API，可按需启用 8848/8080 映射。
      # - "8848:8848"
      # - "8082:8080"
      - "9848:9848"

  # ============================================================
  # 二、应用服务层
  # 说明：承载业务接口、页面资源与统一入口代理。
  # ============================================================

  # Spring Boot 后端服务
  # 说明：依赖数据库、缓存、对象存储与配置中心。
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-runtime
    container_name: hotel-backend
    environment:
      DB_HOST: oracle
      DB_PORT: 1521
      DB_SERVICE: XE
      DB_USERNAME: ${ORACLE_APP_USER:-hotel_user}
      DB_PASSWORD: ${ORACLE_APP_USER_PASSWORD:-hotel_pass}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-hotel-files}
      NACOS_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
    depends_on:
      oracle:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      nacos:
        condition: service_started
    ports:
      - "8080:8080"

  # 前端服务（预生产配置）
  # 说明：用于预生产构建与静态资源托管，开发环境建议本地热更新。
  frontend:
    image: node:20-alpine
    container_name: hotel-frontend
    profiles: ["preprod"]
    working_dir: /app
    volumes:
      - ./hotel-frontend:/app
      - /app/node_modules
    command: sh -c "npm ci --ignore-scripts && npm run build && npx -y serve -s build -l 3000"
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"
    restart: unless-stopped

  # Nginx：统一入口网关
  # 说明：提供统一反向代理入口，前端静态站点由独立服务承载。
  nginx:
    image: nginx:latest
    container_name: hotel-nginx
    # depends_on:
    #   - backend
    #   - minio
    #   - cloudbeaver
    #   - nacos
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    restart: always

  # ============================================================
  # 三、运维与辅助工具层
  # 说明：提供数据库可视化与运行维护辅助能力。
  # ============================================================

  # CloudBeaver：数据库图形化管理工具
  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: hotel-cloudbeaver
    depends_on:
      oracle:
        condition: service_healthy
    ports:
      - "8081:8978"
    environment:
      # 语言与初始化管理员配置。
      - CLOUDBEAVER_CORE_LOCALIZATION=zh
      - CB_ADMIN_NAME=admin
      - CB_ADMIN_PASSWORD=admin_password
      # 服务器显示名称用于完成首次初始化流程。
      - CB_SERVER_NAME=CloudBeaverServer
    volumes:
      - ./cloudbeaver/logs:/opt/cloudbeaver/logs
      - ./cloudbeaver/workspace:/opt/cloudbeaver/workspace

